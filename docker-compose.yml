services:

  nginx:
    image: nginx:alpine
    container_name: goldplatform_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - gold

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: goldplatform_php
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    networks:
      - gold

  mysql:
    image: mysql:8.4
    container_name: goldplatform_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: goldplatform
      MYSQL_USER: gold
      MYSQL_PASSWORD: gold123
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - gold

  redis:
    image: redis:alpine
    container_name: goldplatform_redis
    ports:
      - "6379:6379"
    networks:
      - gold

networks:
  gold:

volumes:
  mysql: